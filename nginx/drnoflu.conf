server {
  listen 80;
  listen [::]:80;
  server_name www.ton-domaine.tld;

  return 301 http://ton-domaine.tld$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name ton-domaine.tld;

  # Cache immutable Next.js build assets very aggressively.
  location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Cache common static files.
  location ~* \.(?:css|js|mjs|json|jpg|jpeg|gif|png|svg|ico|webp|avif|woff|woff2|ttf)$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_cache_bypass $http_upgrade;
  }
}
